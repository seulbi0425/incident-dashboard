spring:
  application:
    name: incident

  # H2 파일 모드 - 서버를 재시작해도 ./data/incident.mv.db 파일에 데이터가 남아 있음
  datasource:
    url: jdbc:h2:file:./data/incident
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      # 기존 데이터를 보존하면서 스키마만 변경분 반영
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # H2 콘솔 (http://localhost:8080/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console
